---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: failover-istio
  namespace: test-gslb-istio
  labels:
    app: failover-istio
spec:
  gateways:
    - istio-ingress/failover-istio
  hosts:
    - failover-istio.cloud.example.com
  http:
    - route:
        - destination:
            host: frontend-podinfo
            port:
              number: 9898
---
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: failover-istio
  namespace: istio-ingress
spec:
  selector:
    app: istio-ingressgateway
  servers:
    - hosts:
        - failover-istio.cloud.example.com
      port:
        number: 8080
        name: http
        protocol: http
---
apiVersion: k8gb.absa.oss/v1beta1
kind: Gslb
metadata:
  name: failover-istio
  namespace: test-gslb-istio
spec:
  resourceRef:
    istioVirtualService:
      matchLabels:
        app: failover-istio
  strategy:
    type: failover
    primaryGeoTag: eu
