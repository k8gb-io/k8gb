# This ingress is used to provide IP addresses for the delegation zone. see: Values.k8gb.ingressPath.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  labels:
    app: init-ingress
  name: init-ingress
  namespace: default
spec:
  ingressClassName: nginx
  rules:
    - host: init.cloud.example.com
      http:
        paths:
          - backend:
              service:
                name: frontend-podinfo
                port:
                  name: http
            path: /
            pathType: Prefix
