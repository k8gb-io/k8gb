name: Github Pages

on:
  push:
    tags:
      - 'v*'
    branches:
      - master
    paths:
      - '**.md'
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/gh-pages.yaml'
  workflow_dispatch:
permissions:
  contents: read

jobs:
  publish:
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit # TODO: change to 'egress-policy: block' after couple of runs

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'

      - name: Install MkDocs
        run: |
          pip3 install mkdocs mkdocs-material mkdocs-git-revision-date-localized-plugin mkdocs-simple-hooks mike

      - name: Setup git config
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Backup preserved files
        run: |
          mkdir -p /tmp/preserved
          git fetch origin gh-pages:gh-pages
          if git checkout gh-pages; then
            echo "Backing up existing files..."
            test -d charts && cp -r charts /tmp/preserved/
            test -f artifacthub-repo.yml && cp artifacthub-repo.yml /tmp/preserved/
            test -f index.yaml && cp index.yaml /tmp/preserved/
            test -f CNAME && cp CNAME /tmp/preserved/
          fi
          git checkout "$GITHUB_REF_NAME"

      - name: Deploy documentation with Mike
        if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
        run: make docs-deploy VERSION=${GITHUB_REF#refs/tags/}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy master documentation
        if: github.ref == 'refs/heads/master'
        run: make docs-deploy-master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy latest 3 documentation versions
        if: github.ref == 'refs/heads/master'
        run: make docs-deploy-last-3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore preserved files
        run: |
          git fetch --force origin gh-pages:gh-pages
          GHPAGES_DIR="${RUNNER_TEMP}/gh-pages"
          echo "GHPAGES_DIR=${GHPAGES_DIR}" >> "${GITHUB_ENV}"
          git worktree add "${GHPAGES_DIR}" gh-pages
          # Restore preserved files
          for path in charts artifacthub-repo.yml index.yaml CNAME; do
            if [ -e "/tmp/preserved/${path}" ]; then
              cp -r "/tmp/preserved/${path}" "${GHPAGES_DIR}/"
            fi
          done

      - name: Sync blog posts to all versions
        if: github.ref == 'refs/heads/master'
        run: make docs-sync-blog

      - name: Update v0.20.0 documentation from Sandbox to Incubating
        if: github.ref == 'refs/heads/master'
        run: sed -i 's/CNCF Sandbox Project/CNCF Incubating Project/g' "${GHPAGES_DIR}/v0.20.0/index.html"

      - name: Commit and push
        run: |
          # Commit and push if there are changes
          git -C "${GHPAGES_DIR}" add .
          if ! git -C "${GHPAGES_DIR}" diff --cached --quiet; then
            COMMIT_MESSAGE="Deploy documentation from ${{ github.sha }}"
            git -C "${GHPAGES_DIR}" commit -m "${COMMIT_MESSAGE}"
            git -C "${GHPAGES_DIR}" push origin gh-pages
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
