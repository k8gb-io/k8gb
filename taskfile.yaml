# https://taskfile.dev/usage/
# use this to get: k8gb.edgeDNSServers[0]
# docker network inspect k3d-action-bridge-network -f '{{ (index .IPAM.Config 0).Gateway }}'
version: '3'
env:
  VERSION: "v0.15.15-rc2-amd64"
  MAKE_VERSION: "v0.14.0"
  MAKE_COMMIT_HASH: "d8db536f"
  MAKE_ARCH: "amd64"
  HELM_PACKAGE: k8gb
  CHART: ./charts

dotenv: ['.env', '{{.ENV}}/.env', '{{.HOME}}/.env']

tasks:

  version:
    cmds:
      - echo $VERSION

  start-*:
    vars:
      CLUSTER: '{{index .MATCH 0}}'
    cmds:
      - echo "starting {{.CLUSTER}}"
      - kubectl -n k8gb scale deployment k8gb --replicas=1 --context={{.CLUSTER}}
    description: "k3d-test-gslb2 = us, k3d-test-gslb1 = eu"

  stop-*:
    vars:
      CLUSTER: '{{index .MATCH 0}}'
    cmds:
      - echo stopping {{.CLUSTER}}
      - kubectl -n k8gb scale deployment k8gb --replicas=0 --context={{.CLUSTER}}
    description: "k3d-test-gslb2 = us, k3d-test-gslb1 = eu"
    ignore_error: true

  install-makefile:
    cmds:
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w -X main.version=$VERSION -X main.commit=123" -o ./k8gb main.go
      - docker build . -t docker.io/absaoss/k8gb:$MAKE_VERSION-$MAKE_COMMIT_HASH-$MAKE_ARCH
      - VERSION=$MAKE_VERSION COMMIT_HASH=$MAKE_COMMIT_HASH ARCH=$MAKE_ARCH make deploy-test-version

  install:
    cmds:
      - defer: { task: us}
      - echo "Installing current k8gb $VERSION"
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w -X main.version=$VERSION -X main.commit=123" -o ./k8gb main.go
      - docker build . -t docker.io/kuritka/k8gb:$VERSION
      - k3d image import docker.io/kuritka/k8gb:$VERSION -c test-gslb1
      - k3d image import docker.io/kuritka/k8gb:$VERSION -c test-gslb2
      - task: stop
      - task: clean
      - kubectl create namespace k8gb --dry-run=client -o yaml | kubectl apply -f - --context=k3d-test-gslb1
      - kubectl create namespace k8gb --dry-run=client -o yaml | kubectl apply -f - --context=k3d-test-gslb2
      - kubectl apply -f ./deploy/crds/init-ingress.yaml --context=k3d-test-gslb1
      - kubectl apply -f ./deploy/crds/init-ingress.yaml --context=k3d-test-gslb2
      - kubectl -n k8gb create secret generic rfc2136 --from-literal=secret=96Ah/a2g0/nLeFGK+d/0tzQcccf9hCEIy34PoXX2Qg8= || true
      - task: install-helm
    #      - task: stop-us
    silent: true

  stop:
    cmds:
      - task: stop-k3d-test-gslb1
      - task: stop-k3d-test-gslb2

  stop-us:
    cmds:
      - task: stop-k3d-test-gslb2

  stop-eu:
    cmds:
      - task: stop-k3d-test-gslb1

  start-us:
    cmds:
      - task: start-k3d-test-gslb2

  start-eu:
    cmds:
      - task: start-k3d-test-gslb1

  us:
    cmds:
      - kubectl config use-context k3d-test-gslb2
  eu:
    cmds:
      - kubectl config use-context k3d-test-gslb1

  install-helm:
    cmds:
      - task: stop
      - task: us
      - helm -n k8gb upgrade -i k8gb ./chart/k8gb -f ./chart/k8gb/values.yaml
        --set k8gb.imageRepo=docker.io/kuritka/k8gb
        --set k8gb.clusterGeoTag=us
        --set k8gb.extGslbClustersGeoTags=eu
        --set k8gb.reconcileRequeueSeconds=10
        --set k8gb.imageTag=$VERSION
        --set k8gb.log.format=simple
        --set k8gb.log.level=debug
        --set rfc2136.enabled=true
        --set k8gb.edgeDNSServers[0]=172.18.0.1:1053
        --set k8gb.dnsZones[0].parentZone="example.com"
        --set k8gb.dnsZones[0].loadBalancedZone="cloud.example.com"
        --set k8gb.dnsZones[0].dnsZoneNegTTL=30
        --wait --timeout=10m0s
      - task: eu
      - helm -n k8gb upgrade -i k8gb ./chart/k8gb -f ./chart/k8gb/values.yaml
        --set k8gb.imageRepo=docker.io/kuritka/k8gb
        --set k8gb.clusterGeoTag=eu
        --set k8gb.extGslbClustersGeoTags=us
        --set k8gb.reconcileRequeueSeconds=10
        --set k8gb.imageTag=$VERSION
        --set k8gb.log.format=simple
        --set k8gb.log.level=debug
        --set rfc2136.enabled=true
        --set k8gb.edgeDNSServers[0]=172.18.0.1:1053
        --set k8gb.dnsZones[0].zone="example.com"
        --set k8gb.dnsZones[0].domain="cloud.example.com"
        --set k8gb.dnsZones[0].dnsZoneNegTTL=30
        --wait --timeout=10m0s

  clean-*:
    vars:
      CLUSTER: '{{index .MATCH 0}}'
    cmds:
      - echo cleaning {{.CLUSTER}}
      - kubectl delete ns -l k8gb.io/terratest=true --context={{.CLUSTER}} --ignore-not-found
      - |
        if kubectl api-resources --context={{.CLUSTER}} --output=name | grep -q "^dnsendpoints$"; then
          echo "Deleting dnsendpoints in k8gb namespace on {{.CLUSTER}}...";
          kubectl delete dnsendpoint --all -n k8gb --context={{.CLUSTER}} --ignore-not-found;
        else
          echo "Skipping dnsendpoint deletion: CRD not found on {{.CLUSTER}}";
        fi
    description: "Clean unused namespaces and default dnsendpoint if CRD exists"

  clean-eu:
    silent: true
    cmds:
      - task: clean-k3d-test-gslb1

  clean-us:
    silent: true
    cmds:
      - task: clean-k3d-test-gslb2

  clean:
    silent: true
    cmds:
      - task: clean-eu
      - task: clean-us

  publish-amd64:
    cmds:
      - echo "Building k8gb-$VERSION"
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w -X main.version=$VERSION -X main.commit=123" -o ./k8gb main.go
      - docker buildx build --platform linux/amd64 -t docker.io/kuritka/k8gb:$VERSION .
      - docker push docker.io/kuritka/k8gb:$VERSION

  retag:
    cmds:
      - docker pull --platform=linux/amd64 artifacts.bcp.absa.co.za/docker.io/kuritka/k8gb:$VERSION
      - docker tag artifacts.bcp.absa.co.za/docker.io/kuritka/k8gb:$VERSION artifacts.bcp.absa.co.za/bks-docker-local/k8gb/k8gb:$VERSION
      - docker push artifacts.bcp.absa.co.za/bks-docker-local/k8gb/k8gb:$VERSION

  # change versions in Charts.yaml
  # requires .env file
  # ARTIFACTORY_USER=
  # ARTIFACTORY_PASSWORD=
  helm:
    cmds:
      - task: retag
      - cd ./chart && helm package $HELM_PACKAGE
      - curl -u $ARTIFACTORY_USER:$ARTIFACTORY_PASSWORD -T ./chart/$HELM_PACKAGE-$VERSION.tgz "https://artifacts.bcp.absa.co.za/artifactory/bks-helm-local/$HELM_PACKAGE-$VERSION.tgz"
      - curl -u $ARTIFACTORY_USER:$ARTIFACTORY_PASSWORD -X POST "https://artifacts.bcp.absa.co.za/artifactory/bks-helm-local/$HELM_PACKAGE/"
      - curl -u $ARTIFACTORY_USER:$ARTIFACTORY_PASSWORD  "https://artifacts.bcp.absa.co.za/artifactory/bks-helm-local/index.yaml" --output ./index.yaml --silent
      - sed -i -e 's/artifacts.cto-bcp.sdc-prod.caas.absa.co.za/artifacts.bcp.absa.co.za/g' index.yaml
      - curl -u $ARTIFACTORY_USER:$ARTIFACTORY_PASSWORD -X DELETE "https://artifacts.bcp.absa.co.za/artifactory/bks-helm-local/index.yaml"
      - curl -u $ARTIFACTORY_USER:$ARTIFACTORY_PASSWORD -T index.yaml "https://artifacts.bcp.absa.co.za/artifactory/bks-helm-local/index.yaml"
      - rm -f index.yaml index.yaml-e out.yaml
      - echo "image artifacts.bcp.absa.co.za/bks-docker-local/k8gb/k8gb:$VERSION"
      - echo "helm https://artifacts.bcp.absa.co.za/artifactory/bks-helm-local/$HELM_PACKAGE/$HELM_PACKAGE-$VERSION.tgz"


  install-clusters:
    cmds:
      - task: install-bind
      - k3d cluster delete test-gslb1 test-gslb2
      - k3d cluster create -c k3d/test-gslb1.yaml
      - task: install-local-cluster
      - k3d cluster create -c k3d/test-gslb2.yaml
      - task: install-local-cluster

  install-bind:
    cmds:
      - k3d cluster delete edgedns
      - k3d cluster create -c k3d/edge-dns.yaml
      - kubectl --context k3d-edgedns apply -f deploy/edge/
      - task: us
      - task: copy

  reset-bind:
    cmds:
      - task: us
      - task: stop-us
      - kubectl scale deployment external-dns -n k8gb --replicas=0
      - kubectl delete dnsendpoint k8gb-ns-extdns-cloud-example-com -n k8gb --ignore-not-found
      - kubectl scale deployment external-dns -n k8gb --replicas=1
      - task: eu
      - task: stop-eu
      - kubectl scale deployment external-dns -n k8gb --replicas=0
      - kubectl delete dnsendpoint k8gb-ns-extdns-cloud-example-com -n k8gb --ignore-not-found
      - kubectl scale deployment external-dns -n k8gb --replicas=1
      - task: install-bind

  install-local-cluster:
    cmds:
      - kubectl create namespace k8gb --dry-run=client -o yaml | kubectl apply -f -
      - helm repo add --force-update nginx-stable https://kubernetes.github.io/ingress-nginx
      - helm repo update
      - helm -n k8gb upgrade -i nginx-ingress nginx-stable/ingress-nginx --version 4.0.15 -f deploy/ingress/nginx-ingress-values.yaml
      - kubectl apply -f ./deploy/crds/init-ingress.yaml
      - kubectl -n k8gb create secret generic rfc2136 --from-literal=secret=96Ah/a2g0/nLeFGK+d/0tzQcccf9hCEIy34PoXX2Qg8= || true
      - kubectl apply -n k8gb -f ./deploy/test/coredns-tcp-svc.yaml

  copy:
    cmds:
      - cp ~/.kube/config ./_/kubeconfig.yml
      - kubectl -n k8gb get secret rfc2136 -o jsonpath="{.data.secret}" | base64 --decode; echo

  check:
    cmds:
      - kubectl exec -it $(kubectl get pod -l app=edge -n default --context=k3d-edgedns -o jsonpath="{.items[0].metadata.name}")  -n default -c bind --context=k3d-edgedns -- cat /var/lib/bind/zones/k8s.zone

  dig:
    cmds:
      - dig cloud.example.com. @localhost  -p 1053 NS +norec

  apply:
    cmds:
      - task: us
      - kubectl apply -f ./_/wus.yaml
      - task: eu
      - kubectl apply -f ./_/weu.yaml

  stop-external-dns:
    cmds:
      - task: us
      - kubectl scale deployment external-dns -n k8gb --replicas=0
      - task: eu
      - kubectl scale deployment external-dns -n k8gb --replicas=0
      - task: copy

  reset:
    cmds:
      - task: install-clusters # clean clusters and install bind
      - task: install # install k8gb
