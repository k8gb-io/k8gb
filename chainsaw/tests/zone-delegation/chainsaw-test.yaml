        - name: parentZone
          value: example.com
        - name: dnsZoneNegTTL
          value: 10
        - name: doFinalize
          value: true
        - name: expectedNsNames
          value:
            - gslb-ns-eu-cloud2.example.com

    - name: (4/5) Verify k8gb-zone-delegation ConfigMap on US
      description: Verify k8gb-zone-delegation ConfigMap contaions only one record *.example.com:5353 on US
      cluster: us
      bindings:
        - name: zoneDelegationHosts
          value:
            - cloud.example.com
      use:
        template: ../../step-templates/assert-k8gb-zone-delegation-cm.yaml

    - name: (4/5) Verify k8gb-zone-delegation ConfigMap on EU
      description: Verify k8gb-zone-delegation ConfigMap contaions only one record *.example.com:5353 on US
      cluster: eu
      bindings:
        - name: zoneDelegationHosts
          value:
            - cloud.example.com
            - cloud2.example.com
      use:
        template: ../../step-templates/assert-k8gb-zone-delegation-cm.yaml

    - name: (4/5) Verify dnsendpoint object on EU
      description: Verify default delegation DNSEndpoint cloud.example.com contains bounded local IPs and gslb-ns-*-cloud.example.com
      cluster: eu
      bindings:
        - name: dnsEndpointName
          value: k8gb-ns-extdns-cloud2-example-com
        - name: loadBalancedZone
          value: cloud2.example.com
        - name: localNsName
          value: gslb-ns-eu-cloud2.example.com
        - name: nsTargets
          value:
            - gslb-ns-eu-cloud2.example.com
      use:
        template: ../../step-templates/assert-k8gb-zone-delegation-dnsendpoint.yaml

