---
apiVersion: k8gb.absa.oss/v1beta1
kind: Gslb
metadata:
  name: failover-object-referenced-gslb
spec:
  resourceRef:
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    name: failover-object-referenced-ingress
  strategy:
    type: failover
    dnsTtlSeconds: 5
    primaryGeoTag: "eu"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: failover-object-referenced-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: failover-object-referenced.cloud.example.com
      http:
        paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: frontend-podinfo
              port:
                name: http
