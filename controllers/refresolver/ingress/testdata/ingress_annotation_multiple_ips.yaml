apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  labels:
    app: ingress-referenced
  annotations:
    k8gb.io/exposed-ip-addresses: "185.199.110.153,185.199.109.153"
  name: ingress-referenced
  namespace: test-gslb
  resourceVersion: "999"
spec:
  ingressClassName: nginx
  rules:
    - host: ingress-referenced.cloud.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: referenced
                port:
                  name: http
status:
  loadBalancer:
    ingress:
      - ip: 10.0.0.1
